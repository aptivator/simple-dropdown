<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Simple Dropdown</title>
    <script type="module" crossorigin src="./main-CrmqMprs.js"></script>
    <link rel="stylesheet" crossorigin href="./main-DJZIX6CM.css">
  </head>
  <body>
    <div class="simple-dropdown-container">
      <h1>Simple Dropdown Example</h1>
      <div id="dropdown-controls">
        <button class="toggler" id="toggle-disabled">Toggle <span>disabled</span></button>
        <button class="toggler" id="toggle-itemsref">Toggle <span>itemsref</span></button>
        <button class="toggler" id="toggle-required">Toggle <span>required</span></button>
      </div>
      <form>
        <simple-dropdown
          name="selection"
          class="my-dropdown"
          itemsref="numbers-full">
        </simple-dropdown>
        <button type="reset">Reset</button>
        <button type="submit">Send</button>
      </form>
      <table>
        <tr>
          <td class="config-cell">disabled:</td>
          <td id="disabled-value"></td>
        </tr>
        <tr>
          <td class="config-cell">itemsref:</td>
          <td id="itemsref-value"></td>
        </tr>
        <tr>
          <td class="config-cell">required:</td>
          <td id="required-value"></td>
        </tr>
        <tr>
          <td colspan="2">&nbsp;</td>
        </tr>
        <tr>
          <td>Simple Dropdown Value:</td>
          <td class="value-displayer" id="simple-dropdown-value"></td>
        </tr>
        <tr>
          <td>Form Data Value:</td>
          <td class="value-displayer" id="form-data-value"></td>
        </tr>
      </table>
    </div>
  </body>
</html>
